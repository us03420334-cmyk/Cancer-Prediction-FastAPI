<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Prediction System</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>Cancer Prediction System</h1>

        <form id="predictionForm">

            <label>Age</label>
            <input type="number" id="Age" placeholder="Enter Age" required>

            <label>Air Pollution</label>
            <input type="number" step="0.1" id="Air_Pollution" placeholder="Enter Air Pollution Index" required>

            <label>Alcohol Use</label>
            <input type="number" step="0.1" id="Alcohol_Use" placeholder="Enter Alcohol Use Index" required>

            <label>Smoking</label>
            <input type="number" step="0.1" id="Smoking" placeholder="Enter Smoking Index" required>

            <label>Obesity Level</label>
            <input type="number" step="0.1" id="Obesity_Level" placeholder="Enter Obesity Level" required>

            <button type="submit">Predict</button>

        </form>

        <h2>Prediction:</h2>

        <p id="result">Prediction will appear here.</p>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
